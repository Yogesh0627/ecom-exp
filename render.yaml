# Render blueprint — deploys the EcoExpress API ONLY.
#
# The frontend is NOT deployed here: the Next.js storefront lives on VERCEL
# (https://ecoexpress-nu.vercel.app), which is a better fit for Next.js and avoids paying for a
# second Render service. Frontend env vars (NEXT_PUBLIC_*) are configured in the Vercel dashboard,
# not in this file. See DEPLOY.md.
#
# The database is EXTERNAL (create a hosted Postgres, e.g. Neon, and set
# DB_URL/DB_USERNAME/DB_PASSWORD below).
#
# Env vars marked `sync: false` are secrets/URLs you fill in the Render dashboard after the first
# deploy. JWT_SECRET is auto-generated. Non-secret values are set inline.

services:
  # ---------------- Backend API (Spring Boot) ----------------
  - type: web
    name: ecoexpress-api
    runtime: docker
    plan: free
    region: singapore            # closest Render region to India
    dockerfilePath: server/Dockerfile
    dockerContext: server
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: google-oauth       # add ",prod" to switch caching to Upstash Redis (needs REDIS_*)

      # -- Database (external hosted Postgres, e.g. Neon) --
      - key: DB_URL               # jdbc:postgresql://<host>/<db>?sslmode=require
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # -- Security --
      - key: JWT_SECRET
        generateValue: true       # Render generates a strong secret
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false

      # -- URLs that cross services --
      # These point at the VERCEL frontend. No trailing slash on CORS_ALLOWED_ORIGINS: the origin
      # is matched exactly, and a trailing slash makes every browser request fail CORS.
      - key: APP_BASE_URL         # https://ecoexpress-api.onrender.com  (this service)
        sync: false
      - key: CORS_ALLOWED_ORIGINS # https://ecoexpress-nu.vercel.app
        sync: false
      - key: OAUTH_SUCCESS_REDIRECT # https://ecoexpress-nu.vercel.app/auth/callback
        sync: false
      - key: OAUTH_FAILURE_REDIRECT # https://ecoexpress-nu.vercel.app/login
        sync: false
      - key: EMAIL_VERIFY_URL     # https://ecoexpress-nu.vercel.app/verify-email
        sync: false

      # -- Google OAuth --
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # -- AI (Gemini) --
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL
        value: gemini-flash-latest

      # -- Email (Resend) --
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Eco Express <noreply@mail.yogeshchauhan.dev>

      # -- Object storage (Cloudflare R2) --
      - key: STORAGE_PROVIDER
        value: s3
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_PUBLIC_URL
        sync: false

      # -- Payments (Razorpay) --
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

      # -- Tax invoice seller identity --
      - key: INVOICE_SELLER_NAME
        sync: false
      - key: INVOICE_SELLER_GSTIN
        sync: false
      - key: INVOICE_SELLER_FSSAI
        sync: false
      - key: INVOICE_SELLER_ADDRESS
        sync: false
      - key: INVOICE_SELLER_CITY
        sync: false
      - key: INVOICE_SELLER_STATE
        sync: false
      - key: INVOICE_SELLER_PINCODE
        sync: false

# ---------------- Frontend (Next.js) — deployed on VERCEL, not Render ----------------
# Nothing to define here. In the Vercel dashboard set:
#   NEXT_PUBLIC_API_BASE_URL      https://ecoexpress-api.onrender.com/api/v1
#   NEXT_PUBLIC_SITE_URL          https://ecoexpress-nu.vercel.app
#   NEXT_PUBLIC_PAYMENTS_TEST_MODE  true
#   NEXT_PUBLIC_ENABLE_DEMO_LOGIN   true
#   NEXT_PUBLIC_DEMO_ADMIN_EMAIL / _PASSWORD   (must match this API's BOOTSTRAP_ADMIN_*)
# NEXT_PUBLIC_* are baked in at BUILD time — after changing one, redeploy on Vercel.
