# Render blueprint — deploys the EcoExpress API + storefront. The database is EXTERNAL (create a
# hosted Postgres, e.g. Neon, and set DB_URL/DB_USERNAME/DB_PASSWORD below). See DEPLOY.md.
#
# Env vars marked `sync: false` are secrets/URLs you fill in the Render dashboard after the first
# deploy (some reference the other service's URL, which only exists once created). JWT_SECRET is
# auto-generated. Non-secret values are set inline.

services:
  # ---------------- Backend API (Spring Boot) ----------------
  - type: web
    name: ecoexpress-api
    runtime: docker
    plan: free
    region: singapore            # closest Render region to India
    dockerfilePath: server/Dockerfile
    dockerContext: server
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: google-oauth       # add ",prod" to switch caching to Upstash Redis (needs REDIS_*)

      # -- Database (external hosted Postgres, e.g. Neon) --
      - key: DB_URL               # jdbc:postgresql://<host>/<db>?sslmode=require
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # -- Security --
      - key: JWT_SECRET
        generateValue: true       # Render generates a strong secret
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false

      # -- URLs that cross services (fill after both exist) --
      - key: APP_BASE_URL         # https://ecoexpress-api.onrender.com
        sync: false
      - key: CORS_ALLOWED_ORIGINS # https://ecoexpress-web.onrender.com
        sync: false
      - key: OAUTH_SUCCESS_REDIRECT # https://ecoexpress-web.onrender.com/auth/callback
        sync: false
      - key: OAUTH_FAILURE_REDIRECT # https://ecoexpress-web.onrender.com/login
        sync: false
      - key: EMAIL_VERIFY_URL     # https://ecoexpress-web.onrender.com/verify-email
        sync: false

      # -- Google OAuth --
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # -- AI (Gemini) --
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL
        value: gemini-flash-latest

      # -- Email (Resend) --
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Eco Express <noreply@mail.yogeshchauhan.dev>

      # -- Object storage (Cloudflare R2) --
      - key: STORAGE_PROVIDER
        value: s3
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_PUBLIC_URL
        sync: false

      # -- Payments (Razorpay) --
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

      # -- Tax invoice seller identity --
      - key: INVOICE_SELLER_NAME
        sync: false
      - key: INVOICE_SELLER_GSTIN
        sync: false
      - key: INVOICE_SELLER_FSSAI
        sync: false
      - key: INVOICE_SELLER_ADDRESS
        sync: false
      - key: INVOICE_SELLER_CITY
        sync: false
      - key: INVOICE_SELLER_STATE
        sync: false
      - key: INVOICE_SELLER_PINCODE
        sync: false

  # ---------------- Frontend storefront (Next.js) ----------------
  - type: web
    name: ecoexpress-web
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: client/Dockerfile
    dockerContext: client
    autoDeploy: true
    envVars:
      # NOTE: all NEXT_PUBLIC_* are baked in at BUILD time. After changing any of them you must
      # redeploy the web service (Manual Deploy → Clear build cache & deploy) for it to take effect.
      - key: NEXT_PUBLIC_API_BASE_URL   # https://ecoexpress-api.onrender.com/api/v1
        sync: false
      - key: NEXT_PUBLIC_SITE_URL       # https://ecoexpress-web.onrender.com  (canonical/OG/sitemap)
        sync: false
      # Payments are in Razorpay TEST mode → the checkout shows the test-card details so anyone can
      # complete a transaction. Set to "false" once you switch to live Razorpay keys.
      - key: NEXT_PUBLIC_PAYMENTS_TEST_MODE
        value: "true"
      # One-click "sign in as Admin/User" for recruiters. Set "false" to hide on a private deploy.
      # If left on, the demo creds below must match the backend's BOOTSTRAP_ADMIN_* and demo user.
      - key: NEXT_PUBLIC_ENABLE_DEMO_LOGIN
        value: "true"
      - key: NEXT_PUBLIC_DEMO_ADMIN_EMAIL      # must equal the API's BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: NEXT_PUBLIC_DEMO_ADMIN_PASSWORD   # must equal the API's BOOTSTRAP_ADMIN_PASSWORD
        sync: false
